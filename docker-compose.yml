services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lineaf
      POSTGRES_PASSWORD: lineaf
      POSTGRES_DB: lineaf_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineaf -d lineaf_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-test-db:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: lineaf
    entrypoint: >
      sh -c "psql -h db -U lineaf -d lineaf_dev -tc \"SELECT 1 FROM pg_database WHERE datname = 'lineaf_test'\" | grep -q 1 || psql -h db -U lineaf -d lineaf_dev -c 'CREATE DATABASE lineaf_test'"
    restart: "no"

volumes:
  postgres_data:
